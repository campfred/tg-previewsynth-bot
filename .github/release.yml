# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes#configuring-automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - dependencies
    authors:
      - dependabot
  categories:
    - title: Bug fixes 🪰🔧
      labels:
        - bug
    - title: Improvements 🆙✨
      labels:
        - enhancement
    - title: Documentation 📚🖊️
      labels:
        - documentation
    - title: Other ➕
      labels:
        - "*"
